server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/project_java
    username: app
    password: app_secret
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# 本机连 Docker 里的 PG 用 localhost；若应用也跑在 Docker 内则改为 postgres:5432
# 可通过 spring.profiles.active=dev 使用 application-dev.yml 覆盖

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: org.example.entity
  configuration:
    map-underscore-to-camel-case: true

security:
  jwt:
    # 签名密钥：正式环境请放到环境变量或单独配置文件
    secret: "change-this-secret-to-a-long-random-string"
    # token 过期时间（分钟）
    expiration-minutes: 60
